<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hanoi Trip 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="data.js"></script>
    <style>
        :root { --bg: #F8F9F7; --card: #FFFFFF; --accent: #6B705C; --sub: #A5A58D; --text: #2D3436; --walk: #E76F51; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; -webkit-font-smoothing: antialiased; }
        
        /* 頁面切換動畫 */
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; padding: 25px 0 10px; }
        h1 { font-weight: 200; letter-spacing: 6px; font-size: 1.5rem; margin: 0; color: var(--accent); }

        /* 行程標題與路線按鈕 */
        .day-header { display: flex; justify-content: space-between; align-items: flex-end; margin: 30px 0 12px; }
        .day-label { font-size: 0.95rem; font-weight: 700; color: var(--accent); border-left: 4px solid var(--accent); padding-left: 15px; }
        .btn-route { font-size: 0.7rem; color: #FFF; background: var(--sub); padding: 5px 12px; border-radius: 15px; text-decoration: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 行程卡片樣式 */
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); }
        .tag { font-size: 0.65rem; background: #F1F3F2; padding: 3px 8px; border-radius: 6px; color: var(--sub); float: right; font-weight: 600; }
        .title { font-size: 1.05rem; margin: 8px 0; font-weight: 600; color: var(--text); clear: both; }
        .info { font-size: 0.8rem; color: #7f8c8d; line-height: 1.5; }
        
        /* 步行/車程節點 */
        .trans-node { margin: 10px 0 10px 30px; font-size: 0.75rem; color: var(--walk); border-left: 1px dashed #CCC; padding-left: 18px; font-style: italic; }

        /* 地圖按鈕 */
        .btn-map { font-size: 0.75rem; color: var(--accent); text-decoration: none; border: 1px solid #EEE; padding: 6px 14px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; background: #FFF; }
        .btn-map:active { background: #F1F3F2; }

        /* 候補清單 */
        .backup-title { color: var(--accent); font-size: 1.1rem; margin: 25px 0 12px 5px; font-weight: bold; }
        .backup-card { background: #FFF; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 3px 10px rgba(0,0,0,0.02); }

        /* 底部導覽列 */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; box-shadow: 0 -2px 15px rgba(0,0,0,0.05); z-index: 1000; }
        .tab-item { flex: 1; text-align: center; padding: 15px 0; font-size: 0.75rem; color: #BBB; cursor: pointer; transition: 0.3s; }
        .tab-item.active { color: var(--accent); font-weight: bold; }
        .tab-item i { display: block; font-size: 1.3rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="itinerary" class="page active">
        <header>
            <h1>HANOI GOGO</h1>
            <div style="font-size:0.75rem; color:#AAA; margin-top:5px; letter-spacing: 1px;">APR 03 — APR 07, 2026</div>
        </header>
        <div id="itinerary-container"></div>
    </div>

    <div id="backup" class="page">
        <header>
            <h1>NIGHTLIFE</h1>
            <div style="font-size:0.75rem; color:#AAA; margin-top:5px;">按摩與酒吧候補</div>
        </header>
        
        <div class="backup-title"><i class="fas fa-spa"></i> 按摩候補名單</div>
        <div id="massage-list"></div>
        
        <div class="backup-title" style="margin-top:40px;"><i class="fas fa-cocktail"></i> 酒吧候補名單</div>
        <div id="bar-list"></div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="showPage('itinerary', this)">
            <i class="fas fa-map-marked-alt"></i>行程
        </div>
        <div class="tab-item" onclick="showPage('backup', this)">
            <i class="fas fa-moon"></i>候補
        </div>
    </nav>

<script>
    // 頁面切換功能
    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 渲染主行程與候補資料
    function renderApp() {
        const container = document.getElementById('itinerary-container');
        
        // 渲染行程
        container.innerHTML = ITINERARY_DATA.map(day => `
            <div class="day-header">
                <div class="day-label">${day.day} · ${day.date}</div>
                ${day.route ? `<a href="${day.route}" class="btn-route" target="_blank"><i class="fas fa-route"></i> 住宿出發路線</a>` : ''}
            </div>
            ${day.items.map(item => item.trans ? 
                `<div class="trans-node">${item.trans}</div>` : 
                `<div class="card">
                    <span class="tag">${item.tag}</span>
                    <div class="title">${item.title}</div>
                    <div class="info">${item.info}</div>
                    ${item.map ? `<a href="${item.map}" class="btn-map" target="_blank"><i class="fas fa-location-arrow"></i> Google Maps</a>` : ''}
                </div>`
            ).join('')}
        `).join('');

        // 渲染按摩候補
        document.getElementById('massage-list').innerHTML = BACKUP_LIST.massage.map(i => `
            <div class="backup-card">
                <div>
                    <div style="font-weight:600; font-size:1rem;">${i.name}</div>
                    <div style="font-size:0.75rem; color:#999; margin-top:4px;">🕙 ${i.time}</div>
                </div>
                <a href="${i.map}" class="btn-map" target="_blank">導航</a>
            </div>`).join('');

        // 渲染酒吧候補
        document.getElementById('bar-list').innerHTML = BACKUP_LIST.bars.map(i => `
            <div class="backup-card">
                <div>
                    <div style="font-weight:600; font-size:1rem;">${i.name}</div>
                    <div style="font-size:0.75rem; color:#999; margin-top:4px;">🕙 ${i.time}</div>
                </div>
                <a href="${i.map}" class="btn-map" target="_blank">導航</a>
            </div>`).join('');
    }

    // 頁面載入完成後啟動
    window.onload = renderApp;
</script>
</body>
</html>
